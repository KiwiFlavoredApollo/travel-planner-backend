server:
  port: 8000

spring:
  application:
    name: demo
  datasource:
    url: jdbc:mariadb://localhost:3306/miniproject?useSSL=false&allowPublicKeyRetrieval=true&authenticationPlugin=mysql_native_password
    username: root
    password: 5242
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 6000ms

# JWT 설정
jwt:
  secret: ${JWT_SECRET_KEY:travel-planner-secret-key-2026-min-256-bits-length}

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.travelplanner.demo
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

lombok:
  addLombokGeneratedAnnotation: true